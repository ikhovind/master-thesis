# This is a basic workflow to help you get started with Actions

name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Generate PDF
        run: |
          sudo apt-get update
          sudo apt install texlive-full
          pdflatex -shell-escape main.tex
      - uses: actions/upload-artifact@v4
        with:
          name: Save PDF
          path: main.pdf
